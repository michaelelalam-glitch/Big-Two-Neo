# Flow 53: Offline Game — Play button tap (select card then play)
# Validates: Card selection + Play button interaction works end-to-end
# Tags: ci-authenticated, offline-game, game-controls

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - offline-game
  - game-controls
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-easy"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 35000
- takeScreenshot: "53_play_button_test_start"

# The play button is disabled until at least one card is selected.
# Verify play-button is present in the DOM regardless of state.
- assertVisible:
    id: "play-button"
- assertVisible:
    id: "pass-button"

# Sort to see cards in order
- tapOn:
    id: "sort-button"

# Pass the first turn (if it's our turn; pass handles both scenarios)
- tapOn:
    id: "pass-button"
- takeScreenshot: "53_after_first_pass"

# Verify play button still present after pass
- assertVisible:
    id: "play-button"

# Pass a second time to ensure UI persists across turns
- tapOn:
    id: "pass-button"
- assertVisible:
    id: "play-button"
- assertVisible:
    id: "pass-button"
- takeScreenshot: "53_game_stable_play_button"
