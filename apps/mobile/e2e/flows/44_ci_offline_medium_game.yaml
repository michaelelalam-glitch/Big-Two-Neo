# Flow 44: Offline Game — Medium bots
# Validates: Game launches at Medium difficulty, basic play/pass interactions work
# Tags: ci-authenticated, offline-game

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - offline-game
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 8000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-medium"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 20000
- takeScreenshot: "44_game_medium_start"

# Verify controls
- assertVisible:
    id: "pass-button"
- assertVisible:
    id: "play-button"

# Sort and pass
- tapOn:
    id: "sort-button"
- tapOn:
    id: "pass-button"
- takeScreenshot: "44_after_pass"

- tapOn:
    id: "pass-button"
- assertNotVisible:
    text: "Error"
    optional: true
- takeScreenshot: "44_game_stable"
