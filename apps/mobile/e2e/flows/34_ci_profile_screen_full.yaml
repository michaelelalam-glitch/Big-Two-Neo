# Flow 34: Profile Screen — Full walk-through
# Validates: Profile screen shows user info and key sections
# Tags: ci-authenticated, navigation, profile

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
  - profile
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Open Profile
- tapOn:
    id: "home-profile-button"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 8000
- takeScreenshot: "34_profile_top"

# Scroll down to see stats/history sections
- swipe:
    direction: DOWN
    duration: 800
- takeScreenshot: "34_profile_bottom"

# Scroll back up
- swipe:
    direction: UP
    duration: 800

# Navigate back
- back
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 8000
