# Flow 61: Offline Game — Rapid tap stress test on helper buttons
# Validates: Rapid successive taps on Sort/Smart/Hint do not crash the game
# Tags: ci-authenticated, offline-game, stability

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - offline-game
  - stability
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 20000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-easy"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 20000

# Rapid taps on sort (simulates fast user interaction)
- tapOn:
    id: "sort-button"
- tapOn:
    id: "sort-button"
- tapOn:
    id: "smart-sort-button"
- tapOn:
    id: "sort-button"
- tapOn:
    id: "hint-button"
- tapOn:
    id: "hint-button"
- tapOn:
    id: "smart-sort-button"
- tapOn:
    id: "smart-sort-button"

- takeScreenshot: "61_rapid_tap_stable"

# Verify no crash
- assertVisible:
    id: "pass-button"
- assertNotVisible:
    text: "Error"
    optional: true

# Game still accepts input
- tapOn:
    id: "pass-button"
- assertVisible:
    id: "pass-button"
