# Flow 50: Lobby Screen — Display and navigation
# Validates: Lobby screen renders correctly with game info
# Tags: ci-authenticated, rooms

appId: com.stephanos.app
tags:
  - ci-authenticated
  - rooms
---
# Note: Reaching LobbyScreen requires a real room to exist or a deep-link.
# This flow exercises the lobby screen via the Create Room → Lobby path.

- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Create a room to enter the lobby
- tapOn: "Create Room"
- extendedWaitUntil:
    visible:
      id: "create-room-submit-button"
    timeout: 8000

# Submit room creation
- tapOn:
    id: "create-room-submit-button"

# Wait for lobby screen
- extendedWaitUntil:
    visible:
      id: "lobby-screen"
    timeout: 15000
- takeScreenshot: "50_lobby_screen"

# Navigate back
- back
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000
