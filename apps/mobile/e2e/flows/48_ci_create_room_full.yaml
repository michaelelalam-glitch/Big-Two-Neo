# Flow 48: Create Room Screen — Full validation
# Validates: Create Room screen loads, form fields are visible, submit button present
# Tags: ci-authenticated, rooms

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - rooms
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 20000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Navigate to Create Room (adjust the tap target to match actual UI text/id)
- tapOn: "Create Room"
- extendedWaitUntil:
    visible: "Create Room"
    timeout: 8000
- takeScreenshot: "48_create_room_screen"

# Verify submit button
- assertVisible:
    id: "create-room-submit-button"

# Scroll to see full form
- swipe:
    direction: DOWN
    duration: 600
- takeScreenshot: "48_create_room_form"

# Navigate back
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 8000
