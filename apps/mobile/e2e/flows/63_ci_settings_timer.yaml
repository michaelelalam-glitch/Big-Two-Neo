# Flow 63: Settings Screen — Timer setting interaction
# Validates: Settings screen renders game timer/turn options and toggles respond
# Tags: ci-authenticated, settings

appId: com.stephanos.app
tags:
  - ci-authenticated
  - settings
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 10000

# Open Settings
- tapOn:
    id: "home-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 8000
- takeScreenshot: "63_settings_open"

# Scroll to timer/game settings section
- swipe:
    direction: DOWN
    duration: 600
- takeScreenshot: "63_settings_scrolled"

# Scroll to bottom
- swipe:
    direction: DOWN
    duration: 600
- takeScreenshot: "63_settings_bottom"

# Scroll back up
- swipe:
    direction: UP
    duration: 1200

# Navigate back
- back
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 8000
