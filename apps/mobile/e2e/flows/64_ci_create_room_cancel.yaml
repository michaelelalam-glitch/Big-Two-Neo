# Flow 64: Create Room → Cancel / Back navigation
# Validates: Create Room can be cancelled and returns to home cleanly
# Tags: ci-authenticated, rooms

appId: com.stephanos.app
tags:
  - ci-authenticated
  - rooms
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Open Create Room
- tapOn: "Create Room"
- extendedWaitUntil:
    visible:
      id: "create-room-submit-button"
    timeout: 8000
- takeScreenshot: "64_create_room_opened"

# Navigate back without submitting
- back
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 8000
- takeScreenshot: "64_back_to_home_after_cancel"

# Verify home is intact
- assertVisible:
    id: "find-game-button"
