# Flow 32: Offline Difficulty Modal — Easy / Medium / Hard buttons
# Validates: Difficulty modal opens with all 3 options, close button works
# Tags: ci-authenticated, navigation, offline-game

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
  - offline-game
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Tap Offline Practice
- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- takeScreenshot: "32_difficulty_modal"

# Verify all 3 difficulty buttons
- assertVisible:
    id: "difficulty-easy"
- assertVisible:
    id: "difficulty-medium"
- assertVisible:
    id: "difficulty-hard"

# Close modal via X button
- tapOn:
    id: "difficulty-modal-close"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 5000
- takeScreenshot: "32_modal_closed"
