# Flow 37: Notifications Screen — Full walk-through
# Validates: Notifications screen loads, displays list, handles empty state
# Tags: ci-authenticated, navigation, notifications

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - navigation
  - notifications
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 15000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Open Notifications
- tapOn:
    id: "home-notifications-button"
- extendedWaitUntil:
    id: "notifications-screen"
    timeout: 8000
- takeScreenshot: "37_notifications_screen"

# Scroll through notifications
- scroll:
    direction: down
    duration: 800
- takeScreenshot: "37_notifications_bottom"
- scroll:
    direction: up
    duration: 800

# Navigate back
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 8000
