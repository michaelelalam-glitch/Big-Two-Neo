# Flow 37: Notifications Screen — Full walk-through
# Validates: Notifications screen loads, displays list, handles empty state
# Tags: ci-authenticated, navigation, notifications

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
  - notifications
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Open Notifications
- tapOn:
    id: "home-notifications-button"
- extendedWaitUntil:
    visible:
      id: "notifications-screen"
    timeout: 8000
- takeScreenshot: "37_notifications_screen"

# Scroll through notifications
- swipe:
    direction: DOWN
    duration: 800
- takeScreenshot: "37_notifications_bottom"
- swipe:
    direction: UP
    duration: 800

# Navigate back
- back
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 8000
