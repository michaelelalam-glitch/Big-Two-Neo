# Flow 15: Privacy Consent Accept Path & Persistence
# Validates: Accepting privacy consent stores the decision so the modal does
#   NOT re-appear on subsequent launches from the same state.
# Tags: smoke
#
# INTENTIONALLY EXCLUDED FROM `ci` TAG:
# This flow accepts consent (not decline). Once accepted, iOS persists the
# consent decision across clearState: true boundaries (via simulator-cached
# App Group / NSUserDefaults shared storage). Subsequent flows that call
# clearState: true and expect the consent modal to appear will fail if this
# flow has run earlier in the same Maestro session.
# Run locally only, or in a dedicated isolated CI job.

appId: com.big2mobile.app
tags:
  - smoke
---
# ── Step 1: Clear state so consent decision is wiped ─────────────────────
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "privacy-consent-decline"
    timeout: 60000

# ── Step 2: Screenshot modal before accepting ─────────────────────────────
- takeScreenshot: "15_privacy_modal_before_accept"

# ── Step 3: Accept privacy consent ───────────────────────────────────────
- tapOn:
    id: "privacy-consent-accept"

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "15_sign_in_after_accept"

# ── Step 4: Cold relaunch WITHOUT clearState ──────────────────────────────
# The accepted decision is stored in AsyncStorage; the modal must NOT reappear.
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Confirm privacy modal is gone (it must not be visible)
- assertNotVisible:
    id: "privacy-consent-accept"
- assertNotVisible:
    id: "privacy-consent-decline"

# Sign-in screen is fully rendered
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-footer"

- takeScreenshot: "15_sign_in_no_modal_on_relaunch"
