# Flow 41: Matchmaking Ranked — Start search then cancel
# Validates: Ranked matchmaking starts, screen shows rank info, cancel works
# Tags: ci-authenticated, matchmaking

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - matchmaking
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 15000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Start ranked matchmaking
- tapOn:
    id: "find-game-button"
- extendedWaitUntil:
    visible: "Choose Game Mode"
    timeout: 6000
- tapOn:
    id: "find-game-ranked"

# Wait for matchmaking screen
- extendedWaitUntil:
    visible:
      id: "matchmaking-screen"
    timeout: 12000
- takeScreenshot: "41_matchmaking_ranked_searching"

# Cancel search
- tapOn:
    id: "cancel-matchmaking-button"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000
- takeScreenshot: "41_back_to_home"
