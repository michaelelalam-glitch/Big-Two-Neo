# Flow 13: Sign-In Screen Interaction & Error Handling
# Validates: Interactive elements respond correctly, app remains stable after relaunch
# Tags: smoke, ci
#
# Tests user interactions on the sign-in screen that don't require
# authentication to complete. Covers:
# 1. Privacy consent modal appears and can be accepted
# 2. Sign-in screen renders all expected elements after consent
# 3. App remains stable and functional after a warm relaunch
#
# NOTE: Google sign-in button tap is intentionally NOT performed in this CI flow.
# Tapping it opens a native Safari/OAuth dialog that persists across app restarts,
# polluting simulator state for subsequent flows. Button presence is verified via
# assertVisible (step 6) which confirms it is rendered and accessible.
# OAuth button interaction is tested in ci-authenticated flows.
#
# No authentication required — operates entirely on the unauthenticated surface.

appId: com.big2mobile.app
tags:
  - smoke
  - ci
---
# Step 1: Launch with clean state
- launchApp:
    clearState: true

# Step 2: Verify privacy consent modal appears
- extendedWaitUntil:
    visible:
      id: "privacy-consent-decline"
    timeout: 60000

# Step 3: Take screenshot of privacy consent modal
- takeScreenshot: "13_privacy_consent_modal"

# Step 4: Accept privacy consent (test accept path, vs decline in flow 01/11)
- tapOn:
    id: "privacy-consent-accept"

# Step 5: Wait for sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Step 6: Verify all interactive elements are present and accessible
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "sign-in-footer"

# Step 7: Take screenshot of complete sign-in screen
- takeScreenshot: "13_sign_in_screen_complete"

# Step 8: Warm relaunch without state clear (consent persists as 'true', no modal)
# Validates the app re-enters the sign-in screen correctly without triggering
# consent modal again (because ANALYTICS_CONSENT='true' was persisted in step 4).
- launchApp

# Step 9: Verify app is still functional after warm relaunch
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "google-sign-in-button"

- takeScreenshot: "13_post_relaunch_stable"
