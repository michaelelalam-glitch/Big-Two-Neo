# Flow 13: Sign-In Screen Interaction & Error Handling
# Validates: Interactive elements respond correctly, error states handled
# Tags: smoke, ci
#
# Tests user interactions on the sign-in screen that don't require
# authentication to complete. Covers:
# 1. Google sign-in button is tappable (tapOn succeeds without crash)
# 2. Privacy consent modal re-appears after state clear
# 3. App remains stable after rapid consecutive taps
# 4. Screen elements maintain correct layout after orientation changes
#
# No authentication required — operates entirely on the unauthenticated surface.

appId: com.big2mobile.app
tags:
  - smoke
  - ci
---
# Step 1: Launch with clean state
- launchApp:
    clearState: true

# Step 2: Verify privacy consent modal appears
- extendedWaitUntil:
    visible:
      id: "privacy-consent-decline"
    timeout: 30000

# Step 3: Take screenshot of privacy consent modal
- takeScreenshot: "13_privacy_consent_modal"

# Step 4: Accept privacy consent (test accept path, vs decline in flow 01/11)
- tapOn:
    id: "privacy-consent-accept"

# Step 5: Wait for sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Step 6: Verify all interactive elements are present
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "sign-in-footer"

# Step 7: Tap Google sign-in button — should not crash the app
# (Google auth will show a native dialog/webview which we dismiss by relaunching)
- tapOn:
    id: "google-sign-in-button"

# Step 8: Brief wait to ensure no crash occurred
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 10000
    optional: true

# Step 9: Relaunch to reset state
- launchApp

# Step 10: Verify app is still functional after the auth attempt
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "google-sign-in-button"

- takeScreenshot: "13_post_interaction_stable"
