# Flow 06: Offline Bot Game Launch
# Validates: User can start an offline game against bots and see the game board
# Tags: game, critical-path
#
# Prerequisites: User is authenticated
# Note: Full game interaction (playing cards, scoring) requires complex
# card selection logic that varies per hand. This test verifies the
# game launches correctly and all core UI elements render.
# Source: HomeScreen.tsx + Game components — verified against real UI screenshots

appId: com.big2mobile.app
tags:
  - game
  - critical-path
  - ci-authenticated
---
# Step 1: Launch and navigate to Home (authenticated session assumed)
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 8000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Step 2: Tap "Offline Practice"
- tapOn: "Offline Practice"

# Step 3: Select bot difficulty (modal shows "🤖 Bot Difficulty")
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 5000
- tapOn: "Easy"

# Step 4: Verify game screen loads (non-optional — must fail if game doesn't start)
- extendedWaitUntil:
    visible: "Pass"
    timeout: 20000

# Step 5: Take screenshot of game board
- takeScreenshot: "06_game_board_initial"

# Step 6: Verify game controls are visible
# The game screen should show Play and Pass buttons
- assertVisible:
    id: "pass-button"

# Step 7: Interact with the game — tap Pass to verify game responds to input
- tapOn:
    id: "pass-button"

# Step 8: Verify the game is still running and no error overlay appeared after pass
- assertVisible:
    id: "pass-button"
- assertNotVisible:
    text: "Error"
    optional: true

# Step 9: Take screenshot of post-pass game state
- takeScreenshot: "06_game_after_pass"
