# Flow 11: App Relaunch State Reset
# Validates: App correctly resets to sign-in screen after state clear, multiple launches work
# Tags: smoke, ci
#
# Tests that the app properly handles re-launch scenarios:
# 1. First launch shows sign-in screen (no stored credentials)
# 2. Killing and relaunching retains the correct unauthenticated state
#
# This catches regressions where state is not properly cleared between sessions
# or where the auth redirect fails to show the sign-in screen on cold start.
# No authentication required.
appId: com.big2mobile.app
tags:
  - smoke
  - ci
---
# Step 1: First launch with full state clear
- launchApp:
    clearState: true

# Step 2: Confirm sign-in screen on initial cold start
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "sign-in-title"

- takeScreenshot: "11_relaunch_first_cold_start"

# Step 3: Terminate the app (simulate user killing the app)
- stopApp

# Allow the OS time to fully clean up the process before relaunch.
# On macos-latest iOS simulators in CI the XCUITest AXServer can linger
# for a few seconds after stopApp, causing the second launch to race with
# the cleanup and crash.  A 5 s pause eliminates that race reliably.
- sleep: 5000

# Step 4: Relaunch WITHOUT clearState — simulates normal re-open
- launchApp

# Step 5: App should return to sign-in screen (no authenticated session exists)
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Step 6: All sign-in UI elements must still be intact after relaunch
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-footer"

- takeScreenshot: "11_relaunch_second_start"
