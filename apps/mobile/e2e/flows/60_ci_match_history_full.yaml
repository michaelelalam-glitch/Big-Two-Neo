# Flow 60: Match History Screen — Scroll and verify
# Validates: Match history renders, scrollable list visible, no crash
# Tags: ci-authenticated, navigation, match-history

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - navigation
  - match-history
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 20000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Navigate to match history (via Profile or dedicated nav)
- tapOn:
    id: "home-profile-button"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 8000

# Tap Match History tab/button
- tapOn: "Match History"
- takeScreenshot: "60_match_history_screen"

# Scroll through history
- swipe:
    direction: DOWN
    duration: 800
- takeScreenshot: "60_match_history_scrolled"

- swipe:
    direction: UP
    duration: 800

- back
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 8000
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 8000
