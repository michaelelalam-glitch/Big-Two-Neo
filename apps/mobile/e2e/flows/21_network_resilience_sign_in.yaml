# Flow 21: Intermittent Network Resilience — Sign-In Screen
# Validates: The sign-in screen renders correctly even when the initial
#   AuthProvider session-check (Supabase network round-trip) takes longer
#   than usual. The screen must not remain on an infinite loading spinner.
# Tags: smoke, ci
#
# No auth required. Uses launchApp without clearState to avoid iOS simulator
# instability (see CI_E2E_FAILURE_POSTMORTEM.md). Consent modal is dismissed
# optionally. Tests the sign-in screen under conservative timeouts and
# validates background/foreground recovery mid-load.

appId: com.big2mobile.app
tags:
  - smoke
  - ci

---
# ── Step 1: Launch — may hit slow network ─────────────────────────────────
- launchApp

- tapOn:
    id: "privacy-consent-decline"
    optional: true

# Use maximum allowed timeout: AuthProvider session check can be slow in CI
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "21_network_slow_sign_in_loaded"

# ── Step 2: Background mid-session then resume ────────────────────────────
# Simulates network interruption between loading states
- pressKey: Home
- waitForAnimationToEnd

- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 60000

- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "21_after_background_during_load"

# ── Step 3: Relaunch to reset Supabase client ─────────────────────────────
- launchApp

- tapOn:
    id: "privacy-consent-decline"
    optional: true

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Final assertion: all elements rendered correctly after full reset
- assertVisible:
    id: "sign-in-screen"
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-footer"

- takeScreenshot: "21_final_clean_launch"
