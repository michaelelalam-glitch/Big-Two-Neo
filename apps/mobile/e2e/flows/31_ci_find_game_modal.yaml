# Flow 31: Find Game Modal — Casual & Ranked buttons
# Validates: Find Game modal opens, shows both options, cancel works
# Tags: ci-authenticated, navigation, matchmaking

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
  - matchmaking
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 10000

# Open Find Game modal
- tapOn:
    id: "find-game-button"
- extendedWaitUntil:
    visible: "Choose Game Mode"
    timeout: 6000
- takeScreenshot: "31_find_game_modal"

# Verify both options visible
- assertVisible:
    id: "find-game-casual"
- assertVisible:
    id: "find-game-ranked"

# Close modal via X button
- tapOn:
    id: "find-game-modal-close"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 5000
- takeScreenshot: "31_modal_closed"
