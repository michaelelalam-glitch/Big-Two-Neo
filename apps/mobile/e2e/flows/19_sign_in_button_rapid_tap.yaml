# Flow 19: Google Sign-In Button Rapid Tap Resilience
# Validates: App does not crash when the Google sign-in button is tapped
#   multiple times in rapid succession. Catches regressions in: button
#   debounce logic, double-invocation of the Google OAuth flow, and any
#   state corruption from rapid concurrent auth initiations.
# Tags: smoke, ci
#
# No auth required. Uses launchApp without clearState to avoid iOS simulator
# instability. We only verify the app survives the tap; we do not complete
# the OAuth flow. The Google auth sheet / webview will appear and be
# dismissed via relaunch.

appId: com.stephanos.app
tags:
  - smoke
  - ci

---
# ── Step 1: Launch and reach sign-in screen ──────────────────────────────
- launchApp

- tapOn:
    id: "privacy-consent-decline"
    optional: true

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "19_before_rapid_tap"

# ── Step 2: First tap — trigger Google auth flow ──────────────────────────
- tapOn:
    id: "google-sign-in-button"

# Brief wait — auth sheet may appear
- waitForAnimationToEnd

# ── Step 3: Immediately tap again (rapid double-tap test) ─────────────────
# Maestro sends the second tap while any auth sheet/overlay may be animating in.
- tapOn:
    id: "google-sign-in-button"
    optional: true

# ── Step 4: Dismiss whatever appeared by relaunching ─────────────────────
# P12-E2E Fix: Before killing the app, attempt to dismiss the ASWebAuthenticationSession
# (Safari OAuth sheet) via its Cancel button. A properly-dismissed session allows
# securityd (the iOS Keychain daemon) to clean up cleanly. When the app is killed while
# an ASWebAuthenticationSession is still open, securityd can become temporarily
# backlogged processing the forced teardown, causing SecureStore.getItemAsync to hang
# on the next app launch and blocking the sign-in screen from appearing.
# The tap is optional — if the sheet never appeared (e.g., network error returning early)
# the launchApp below still handles cleanup.
- tapOn:
    label: "Cancel"
    optional: true
- waitForAnimationToEnd

- launchApp

# ── Step 5: Verify app is still functional ────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "19_stable_after_rapid_tap"

# ── Step 6: Third isolated tap + verify no crash ──────────────────────────
- tapOn:
    id: "google-sign-in-button"
- waitForAnimationToEnd
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "19_final_stable_state"
