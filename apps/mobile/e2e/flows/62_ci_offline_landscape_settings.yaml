# Flow 62: Offline Game — Landscape + settings combination
# Validates: In-game settings modal works in landscape orientation
# Tags: ci-authenticated, offline-game, orientation, game-controls

appId: com.stephanos.app
tags:
  - ci-authenticated
  - offline-game
  - orientation
  - game-controls
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-easy"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 35000

# Rotate to landscape
- setOrientation: LANDSCAPE_LEFT
- takeScreenshot: "62_landscape_game"

# Open in-game settings in landscape
- tapOn:
    id: "settings-button"
- extendedWaitUntil:
    visible:
      id: "close-settings-button"
    timeout: 6000
- takeScreenshot: "62_settings_in_landscape"

# Close settings while in landscape
- tapOn:
    id: "close-settings-button"
- assertVisible:
    id: "pass-button"
- takeScreenshot: "62_landscape_after_settings_close"

# Rotate back
- setOrientation: portrait
- assertVisible:
    id: "pass-button"
