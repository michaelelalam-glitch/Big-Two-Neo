# Flow 54: Game Selection Screen — All game cards
# Validates: Both game cards (Lebanese Poker / Lebanese Deal) are visible and tappable
# Tags: ci-authenticated, navigation

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml

# Game Selection Screen
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- takeScreenshot: "54_game_selection_screen"

# Verify both game cards
- assertVisible:
    id: "lebanese-poker-card"
- assertVisible:
    id: "lebanese-deal-card"

# Tap Lebanese Poker
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000
- takeScreenshot: "54_lebanese_poker_home"

# Back to game selection (if back navigation is available)
- back
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 10000

# Tap Lebanese Deal
- tapOn:
    id: "lebanese-deal-card"
- takeScreenshot: "54_lebanese_deal_home_or_coming_soon"

# Back to game selection
- back
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 10000
- takeScreenshot: "54_back_to_game_selection"
