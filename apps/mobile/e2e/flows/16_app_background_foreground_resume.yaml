# Flow 16: App Background & Foreground Resume
# Validates: App survives being backgrounded and brought back to the foreground.
#   Catches regressions in: React Navigation state persistence, AuthProvider
#   re-initialization on resume, and Supabase session listener cleanup.
# Tags: smoke, ci
#
# No auth required. Uses launchApp without clearState to avoid iOS simulator
# instability (see CI_E2E_FAILURE_POSTMORTEM.md). Consent modal is dismissed
# optionally (may already have been handled by a prior flow).

appId: com.stephanos.app
tags:
  - smoke
  - ci

---
# ── Step 1: Launch and dismiss consent if visible ─────────────────────────
- launchApp

- tapOn:
    id: "privacy-consent-decline"
    optional: true

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "16_sign_in_before_background"

# ── Step 2: Background the app ────────────────────────────────────────────
- pressKey: Home

# Brief pause simulating real-world background time.
# Multiple waitForAnimationToEnd calls compound to give XCUITest's
# AXServer enough teardown time on iOS (Maestro has no sleep command).
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# ── Step 3: Bring app back to foreground ─────────────────────────────────
- launchApp

# ── Step 4: Verify sign-in screen is still intact ─────────────────────────
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 30000

- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-footer"

- takeScreenshot: "16_sign_in_after_foreground_resume"

# ── Step 5: Second background → foreground cycle ──────────────────────────
- pressKey: Home
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 30000

- assertVisible:
    id: "google-sign-in-button"

- takeScreenshot: "16_sign_in_second_resume"
