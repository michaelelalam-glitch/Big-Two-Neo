# Flow 40: Matchmaking Casual — Start search then cancel
# Validates: Casual matchmaking starts, matchmaking screen shows, cancel works
# Tags: ci-authenticated, matchmaking

appId: com.stephanos.app
tags:
  - ci-authenticated
  - matchmaking
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Start casual matchmaking
- tapOn:
    id: "find-game-button"
- extendedWaitUntil:
    visible: "Choose Game Mode"
    timeout: 6000
- tapOn:
    id: "find-game-casual"

# Wait for matchmaking screen
- extendedWaitUntil:
    visible:
      id: "matchmaking-screen"
    timeout: 12000
- takeScreenshot: "40_matchmaking_casual_searching"

# Cancel search
- tapOn:
    id: "cancel-matchmaking-button"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000
- takeScreenshot: "40_back_to_home"
