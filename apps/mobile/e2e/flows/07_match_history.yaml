# Flow 07: Leaderboard & Profile Navigation
# Validates: User can navigate to Leaderboard and Profile screens
# Tags: navigation, history
#
# Prerequisites: User is authenticated
# Source: HomeScreen.tsx — verified against real UI screenshots

appId: com.big2mobile.app
tags:
  - navigation
  - history
  - ci-authenticated
---
# Step 1: Launch and navigate to Home
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 8000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Step 2: Navigate to Leaderboard (top bar button: 🏆 icon with testID)
- tapOn:
    id: "leaderboard-button"
- extendedWaitUntil:
    visible: "Leaderboard"
    timeout: 10000

# Step 2b: Verify leaderboard has actual content (not just title)
- assertVisible: "Rank"

# Step 3: Take screenshot
- takeScreenshot: "07_leaderboard"

# Step 4: Go back
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Step 5: Navigate to Profile (top bar button)
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 10000

# Step 5b: Verify profile has actual content (not just title)
- assertVisible: "Games Played"

# Step 6: Take screenshot of profile
- takeScreenshot: "07_profile"
