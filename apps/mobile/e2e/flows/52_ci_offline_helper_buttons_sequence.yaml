# Flow 52: Offline Game — All helper buttons in sequence
# Validates: Sort → Smart Sort → Hint all work without errors in a single session
# Tags: ci-authenticated, offline-game, game-controls

appId: com.stephanos.app
tags:
  - ci-authenticated
  - offline-game
  - game-controls
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-medium"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 35000
- takeScreenshot: "52_helper_buttons_game_start"

# Sequence: Sort → Smart → Hint → Sort → Smart → Hint (verify idempotent)
- tapOn:
    id: "sort-button"
- takeScreenshot: "52_after_sort_1"

- tapOn:
    id: "smart-sort-button"
- takeScreenshot: "52_after_smart_1"

- tapOn:
    id: "hint-button"
- takeScreenshot: "52_after_hint_1"

- tapOn:
    id: "sort-button"
- takeScreenshot: "52_after_sort_2"

- tapOn:
    id: "smart-sort-button"
- takeScreenshot: "52_after_smart_2"

- tapOn:
    id: "hint-button"
- takeScreenshot: "52_after_hint_2"

# Verify no crash
- assertVisible:
    id: "pass-button"
- assertNotVisible:
    text: "Error"
    optional: true
