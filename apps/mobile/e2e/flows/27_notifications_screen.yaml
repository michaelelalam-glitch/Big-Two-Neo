# Flow 27: Notifications Screen
# Validates: Notifications screen is accessible and displays core UI
# Tags: navigation, auth-required
#
# Prerequisites: User is authenticated and on the Home screen
# Source: NotificationsScreen.tsx — testID="notifications-screen"

appId: com.big2mobile.app
tags:
  - navigation
  - auth-required
  - ci-authenticated
---
# Step 1: Launch and navigate to Home
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 20000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Step 2: Navigate to Notifications screen via bell button
- tapOn:
    id: "home-notifications-button"
- extendedWaitUntil:
    visible:
      id: "notifications-screen"
    timeout: 10000

# Step 3: Verify Notifications header
- assertVisible: "Notifications"
- takeScreenshot: "27_notifications_screen"

# Step 5: Take final screenshot
- takeScreenshot: "27_notifications_full"

# Step 6: Go back
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000
