# Flow 23: Profile Screen
# Validates: Profile screen is accessible and displays core UI elements
# Tags: navigation, auth-required
#
# Prerequisites: User is authenticated and on the Home screen
# Source: ProfileScreen.tsx — testID="profile-screen"

appId: com.big2mobile.app
tags:
  - navigation
  - auth-required
  - ci-authenticated
---
# Step 1: Launch and navigate to Home
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 8000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

# Step 2: Navigate to Profile screen
- tapOn:
    id: "home-profile-button"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000

# Step 3: Verify Profile screen header
- assertVisible: "Profile"
- takeScreenshot: "23_profile_screen"

# Step 4: Verify "View Full Stats" button
- assertVisible: "View Full Stats"

# Step 5: Verify "Match History" section is present
- assertVisible: "Match History"

# Step 6: Verify "Sign Out" is present
- assertVisible: "Sign Out"

# Step 7: Take screenshot before navigating to stats
- takeScreenshot: "23_profile_screen_full"

# Step 8: Go back
- back
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000
