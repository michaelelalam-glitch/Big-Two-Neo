# Flow 59: App Background / Foreground during game
# Validates: Backgrounding app mid-game and resuming does not crash or lose state
# Tags: ci-authenticated, offline-game, stability

appId: com.big2mobile.app
tags:
  - ci-authenticated
  - offline-game
  - stability
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "chinese-poker-card"
- extendedWaitUntil:
    visible: "Big2 Mobile"
    timeout: 10000

- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-easy"

- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 35000
- takeScreenshot: "59_game_before_background"

# Background and foreground the app
- pressKey: Home
- takeScreenshot: "59_app_backgrounded"
- launchApp:
    stopApp: false
- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 15000
- takeScreenshot: "59_game_resumed"

# Verify state preserved
- assertVisible:
    id: "pass-button"
- assertVisible:
    id: "play-button"
- assertNotVisible:
    text: "Error"
    optional: true
