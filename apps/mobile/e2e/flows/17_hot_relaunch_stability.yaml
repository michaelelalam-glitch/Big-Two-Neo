# Flow 17: Hot Relaunch Stability (No State Clear)
# Validates: App is stable across 5 consecutive hot relaunches without clearing
#   AsyncStorage between cycles. Catches regressions in singleton re-init
#   (SoundManager, Supabase client), navigation stack accumulation, and
#   React Native bridge state bleed between launches.
# Tags: smoke, stability, ci
#
# No auth required. Uses launchApp without clearState to avoid iOS simulator
# instability (see CI_E2E_FAILURE_POSTMORTEM.md). Complements flow 14
# (which uses clearState: true between every cycle).

appId: com.stephanos.app
tags:
  - smoke
  - stability
  - ci

---
# ── Cycle 1: Base launch ─────────────────────────────────────────────────
- launchApp

- tapOn:
    id: "privacy-consent-decline"
    optional: true

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "17_hot_relaunch_cycle1"

# ── Cycle 2: Hot relaunch, no state clear ─────────────────────────────────
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    # P12-E2E Fix: increased from 60000 to 120000.
    # On CI iOS simulators, rapid app kill/relaunch cycles can cause the Keychain
    # daemon (securityd) to become briefly backlogged, making SecureStore.getItemAsync
    # hang until the P12-E2E timeout (5s) fires and falls back to AsyncStorage.
    # The net startup time is now bounded at ~5-10 s, but adding buffer here keeps
    # the test robust against slow CI runner CPU or memory pressure.
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "17_hot_relaunch_cycle2"

# ── Cycle 3 ───────────────────────────────────────────────────────────────
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "17_hot_relaunch_cycle3"

# ── Cycle 4 ───────────────────────────────────────────────────────────────
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000
- assertVisible:
    id: "google-sign-in-button"
- takeScreenshot: "17_hot_relaunch_cycle4"

# ── Cycle 5: Final full assertion ─────────────────────────────────────────
- launchApp

- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# All elements must still render correctly after 5 hot relaunches
- assertVisible:
    id: "sign-in-screen"
- assertVisible:
    id: "sign-in-title"
- assertVisible:
    id: "sign-in-subtitle"
- assertVisible:
    id: "google-sign-in-button"
- assertVisible:
    id: "sign-in-footer"

- takeScreenshot: "17_hot_relaunch_cycle5_final"
