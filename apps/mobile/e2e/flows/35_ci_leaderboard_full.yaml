# Flow 35: Leaderboard Screen — Full walk-through with all tabs
# Validates: Leaderboard tabs (Casual/Ranked) and time filters (All Time/Weekly/Daily)
# Tags: ci-authenticated, navigation, leaderboard

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
  - leaderboard
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 10000

# Open Leaderboard
- tapOn:
    id: "leaderboard-button"
- extendedWaitUntil:
    visible:
      id: "leaderboard-screen"
    timeout: 10000
- takeScreenshot: "35_leaderboard_casual"

# Type tabs: switch to Ranked
- tapOn: "Ranked"
- takeScreenshot: "35_leaderboard_ranked"

# Back to Casual
- tapOn: "Casual"

# Time filters
- tapOn: "Weekly"
- takeScreenshot: "35_leaderboard_weekly"
- tapOn: "Daily"
- takeScreenshot: "35_leaderboard_daily"
- tapOn: "All Time"

# Navigate back
- back
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 8000
