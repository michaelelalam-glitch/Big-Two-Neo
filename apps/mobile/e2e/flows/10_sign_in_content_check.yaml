# Flow 10: Sign-In Screen Content Validation
# Validates: Sign-in screen element presence/hierarchy and screenshot baseline
# Tags: smoke, ci
#
# Extends flow 01 with deeper element-level assertions on the sign-in screen.
# All assertions use testID selectors so they are Hermes/Metro Release-safe.
# No authentication required — uses clearState to guarantee unauthenticated state.
#
# Complements flow 01 by verifying the expected sign-in UI structure (beyond basic presence).
appId: com.big2mobile.app
tags:
  - smoke
  - ci
---
# Step 1: Launch with clean state
- launchApp:
    clearState: true

# Step 2: Wait for sign-in screen
- extendedWaitUntil:
    visible:
      id: "sign-in-screen"
    timeout: 120000

# Step 3: Verify welcome title text
- assertVisible:
    id: "sign-in-title"

# Step 4: Verify Google sign-in button is tappable (present and not disabled)
- assertVisible:
    id: "google-sign-in-button"

# Step 5: Verify the subtitle is present
- assertVisible:
    id: "sign-in-subtitle"

# Step 6: Scroll to bottom if needed to locate footer, then verify it is visible
- scrollUntilVisible:
    element:
      id: "sign-in-footer"
    direction: DOWN
    timeout: 10000

# Step 7: Verify sign-in footer copyright/terms text is present after scroll
- assertVisible:
    id: "sign-in-footer"

# Step 8: Take baseline screenshot for CI visual audit
- takeScreenshot: "10_sign_in_content_check"
