# Flow 42: Bug Report Modal — Open, fill, dismiss
# Validates: Bug report modal opens, form fields visible, cancel works
# Tags: ci-authenticated, navigation

appId: com.stephanos.app
tags:
  - ci-authenticated
  - navigation
---
- launchApp

# Dismiss consent modal if shown (defensive CI fallback — R32)
- runFlow: ../shared/dismiss_consent_if_shown.yaml
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 35000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 10000

# Open Bug Report modal
- tapOn:
    id: "bug-report-button"
- extendedWaitUntil:
    visible: "Bug Report"
    timeout: 6000
- takeScreenshot: "42_bug_report_modal"

# Verify submit button is in modal
- assertVisible:
    id: "bug-report-submit"

# Close / dismiss (swipe down or tap outside)
- back
- extendedWaitUntil:
    visible: "Stephanos Mobile"
    timeout: 8000
- takeScreenshot: "42_back_to_home"
