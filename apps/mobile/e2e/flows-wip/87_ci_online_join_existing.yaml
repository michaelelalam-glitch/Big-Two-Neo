# Helper: Join an existing online multiplayer room (used by online-e2e flows 80-83)
# This flow is a stub — online multiplayer is not available in CI.
appId: com.stephanos.app
tags:
  - helper
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 15000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000
- tapOn:
    text: "Play Online"
    optional: true
- extendedWaitUntil:
    visible: "Join Room"
    timeout: 10000
