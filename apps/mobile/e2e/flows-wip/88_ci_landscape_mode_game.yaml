# Helper: Navigate into an offline game room in landscape mode (used by landscape flows)
# This is a reusable sub-flow

appId: com.stephanos.app
tags:
  - helper
---
- launchApp
- extendedWaitUntil:
    visible: "Choose a game to play"
    timeout: 15000
- tapOn:
    id: "lebanese-poker-card"
- extendedWaitUntil:
    visible: "Stephanos"
    timeout: 10000

# Enter offline game
- tapOn: "Offline Practice"
- extendedWaitUntil:
    visible: "Bot Difficulty"
    timeout: 6000
- tapOn:
    id: "difficulty-easy"

# Wait for game board to fully load
- extendedWaitUntil:
    visible:
      id: "pass-button"
    timeout: 20000
- waitForAnimationToEnd

# Switch to landscape
- tapOn:
    id: "orientation-toggle-button"
    optional: true
- waitForAnimationToEnd
