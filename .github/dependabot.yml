# P8-7 FIX: Automate dependency version bumps via Dependabot so security
# advisories and minor updates are surfaced as PRs without manual triage.
version: 2
updates:
  # Keep npm (pnpm workspace) dependencies up to date.
  - package-ecosystem: "npm"
    directory: "/apps/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Group non-breaking patch/minor updates into a single PR to reduce noise.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions up to date (actions/checkout, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
