name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop, 'game/chinese-poker']
  push:
    branches: [main, develop]

jobs:
  test:
    name: Lint, Type-Check, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # Expose Supabase secrets at job level so `if:` conditions on integration
    # test steps can evaluate them correctly. Step-level `env:` is only visible
    # to its own step's `if:`, causing both "skipped" warning AND integration
    # test steps to fire simultaneously (bug in run #22512987110).
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: 🔍 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: 💾 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: 💾 Setup Jest transform cache
        uses: actions/cache@v4
        with:
          path: apps/mobile/.jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-jest-
      
      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🔍 Run ESLint
        run: |
          cd apps/mobile
          pnpm run lint
      
      - name: 🔧 Run TypeScript type-check
        run: |
          cd apps/mobile
          npx tsc --noEmit
      
      - name: 🧪 Run unit tests
        run: |
          cd apps/mobile
          # Run all unit tests with coverage.
          # Coverage thresholds (branches 78, functions 76, lines 76, statements 76)
          # are enforced in jest.config.js — Jest exits non-zero if coverage drops
          # below thresholds. With isolatedModules: true in ts-jest config, coverage
          # completes in ~60s on 2-vCPU CI runners (was 11+ min without isolatedModules).
          # --forceExit: forces process.exit after all tests complete if open handles
          #   remain (e.g. unclosed DB connections). It does NOT mask test failures —
          #   jest sets the exit code before the force-exit fires. Use
          #   --detectOpenHandles locally to debug any open-handle warnings.
          # --maxWorkers=2: matches CI runner's 2 vCPUs.
          NODE_OPTIONS="--max-old-space-size=3072" npx jest \
            --testPathIgnorePatterns='/integration/' \
            --forceExit --passWithNoTests \
            --maxWorkers=2 \
            --testTimeout=15000 \
            --coverage
        timeout-minutes: 15
      
      
      - name: ⚠️ Integration tests skipped (no credentials)
        if: env.EXPO_PUBLIC_SUPABASE_ANON_KEY == '' || env.SUPABASE_SERVICE_ROLE_KEY == ''
        run: |
          echo "::warning::Integration tests cannot run because EXPO_PUBLIC_SUPABASE_ANON_KEY and/or SUPABASE_SERVICE_ROLE_KEY are not configured as GitHub secrets."
          echo "Add these secrets to the repository to enable integration tests."
          echo "Skipping integration tests — they are non-blocking until secrets are configured."

      - name: 🧪 Run integration tests
        if: env.EXPO_PUBLIC_SUPABASE_ANON_KEY != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: |
          cd apps/mobile
          NODE_OPTIONS="--max-old-space-size=3072" npx jest \
            --testPathPattern='integration/' \
            --forceExit --passWithNoTests \
            --maxWorkers=2 \
            --testTimeout=30000 \
            --no-coverage
        timeout-minutes: 5
        env:
          CI: true
      
      - name: 📊 Upload test coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          directory: ./apps/mobile/coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: ✅ All checks passed
        run: echo "🎉 All CI checks completed successfully!"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🏗️ Check Expo build configuration
        run: |
          cd apps/mobile
          npx expo prebuild --no-install --clean
      
      - name: ✅ Build configuration valid
        run: echo "🎉 Build configuration is valid!"

  e2e:
    name: E2E Tests (Maestro)
    runs-on: macos-latest
    needs: test
    # Only run on PRs from non-fork branches to save CI minutes (macOS
    # runners are ~10× more expensive) and because fork PRs don't have access
    # to repository secrets which the app needs to boot without crashing.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 55

    env:
      # App needs Supabase env vars to initialize without crashing.
      # Fork PRs are excluded via the `if:` condition above since they
      # cannot access these secrets.
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: ☕ Setup Java 17 (Maestro dependency)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🎭 Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version
      
      - name: 📱 Boot iOS Simulator
        run: |
          # List available simulators and boot iPhone 16
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone 16' in d['name'] or 'iPhone 15' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          # Fallback: first available iOS device
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      print(d['udid'])
                      sys.exit(0)
          ")
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          # Wait for simulator to be ready
          xcrun simctl bootstatus "$DEVICE_ID" -b
          # Export DEVICE_ID for subsequent steps
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
      
      - name: 💾 Cache CocoaPods specs
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          # ios/Podfile doesn't exist until expo prebuild runs, so key off
          # package.json + lockfile + app.json which determine pod dependencies.
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: 💾 Cache Pods directory
        uses: actions/cache@v4
        with:
          # Cache the resolved Pods directory (spec + source) so pod install
          # only links rather than downloading on cache hits.
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-dir-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-dir-

      - name: 💾 Restore DerivedData cache (stable path, survives expo prebuild)
        uses: actions/cache/restore@v4
        with:
          # DerivedData is stored OUTSIDE ios/ so that expo prebuild --clean
          # (which wipes ios/) does not destroy the incremental build cache.
          # On cache hits xcodebuild performs an incremental compile (~2-5 min)
          # instead of a full rebuild (~15-20 min).
          path: ~/DerivedData/Big2Mobile
          # v2: force cache miss to avoid restoring partial DerivedData from
          # the failed build (expo-camera CameraViewLegacy.swift errors). Once
          # the first successful build populates the cache, subsequent runs will
          # hit this key and get incremental builds again.
          key: ${{ runner.os }}-deriveddata-v2-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-v2-

      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🏗️ Build iOS app for Simulator
        run: |
          set -o pipefail
          cd apps/mobile
          # Prebuild WITHOUT --no-install so CocoaPods runs → generates .xcworkspace
          npx expo prebuild --clean --platform ios
          cd ios
          # Build RELEASE so JavaScript bundle is embedded in the app binary.
          # Debug builds load JS from Metro dev server which isn't available in CI,
          # causing the Expo Dev Client launcher to appear instead of the app.
          # -jobs: use all available vCPUs for parallel Clang compilation.
          # -derivedDataPath ~/DerivedData/Big2Mobile: keeps build artifacts at a
          #   stable path outside ios/ so expo prebuild --clean doesn't wipe the
          #   incremental cache on the next run (was apps/mobile/ios/build before).
          # Tee full log so we can grep Swift/Clang errors even when they scroll.
          # set +e / set -e wraps the pipeline so PIPESTATUS is captured before the
          # error-exit fires (set -e would otherwise exit immediately on a failing
          # pipeline, skipping the summary block).
          # NOTE: do NOT pipe through tail here — tail exits after N lines which causes
          # a broken pipe that sets PIPESTATUS[0]=65 and kills xcodebuild with SIGPIPE
          # even on a successful build. Tail/grep the saved log only in the summary block.
          set +e
          xcodebuild -workspace Big2Mobile.xcworkspace \
            -scheme Big2Mobile \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.DEVICE_ID }}" \
            -derivedDataPath ~/DerivedData/Big2Mobile \
            build \
            -jobs $(sysctl -n hw.ncpu) \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcodebuild.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "--- Last 150 build lines ---"
            tail -150 /tmp/xcodebuild.log
            echo "--- Swift / Clang error summary ---"
            grep -E " error: | warning: " /tmp/xcodebuild.log | head -40 || true
            exit $EXIT_CODE
          fi
        timeout-minutes: 45

      - name: 💾 Save DerivedData cache (always, even on build failure/timeout)
        # Saving with if: always() ensures the cache is preserved even when the
        # build times out — breaking the infinite cache-miss loop where every run
        # does a full 20-30 min rebuild. actions/cache/restore@v4 above handles
        # the restore; this dedicated save step handles the write-back.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/DerivedData/Big2Mobile
          key: ${{ runner.os }}-deriveddata-v2-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
      
      - name: 📲 Install app on Simulator
        run: |
          # DerivedData is now at ~/DerivedData/Big2Mobile (stable path outside ios/)
          APP_PATH=$(find ~/DerivedData/Big2Mobile/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in derived data. Build may have failed."
            find ~/DerivedData/Big2Mobile -type d -maxdepth 4 2>/dev/null || echo "DerivedData directory doesn't exist"
            exit 1
          fi
          echo "Installing app: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: ⏳ Warm up simulator after install
        run: |
          # Give the simulator time to register the newly installed app and
          # let the XCUITest AXServer fully initialize. Without this, Maestro's
          # XCUITest driver times out connecting to port 7001 on the first run.
          # Also launch + terminate the app once so SpringBoard caches it.
          xcrun simctl launch booted com.big2mobile.app || true
          sleep 15
          xcrun simctl terminate booted com.big2mobile.app || true
          sleep 5
      
      - name: 🎭 Run Maestro E2E tests
        run: |
          cd apps/mobile
          # Create results directory (Maestro doesn't auto-create it)
          mkdir -p e2e/results
          # Run CI-tagged flows (tests that pass without authentication).
          # Auth-dependent flows (02-08) require Google/Apple Sign-In which
          # cannot be automated in CI — they run locally or in dedicated
          # integration environments with test credentials.
          #
          # timeout-minutes is 25 to account for:
          #   - XCUITest driver startup on a cold macos-latest runner: up to 5 min
          #     (MAESTRO_DRIVER_STARTUP_TIMEOUT=300000 below)
          #   - App launch + sign-in screen render (Release JS bundle): up to 3 min
          #   - Test assertions and screenshot: ~1 min
          #   - Buffer for runner variance: ~5 min
          #   Prior value of 10 min was too short: Maestro was killed mid-startup,
          #   producing exit 65 and no results XML.
          set +e
          maestro test --include-tags ci e2e/flows/ \
            --format junit \
            --output e2e/results/results.xml
          MAESTRO_EXIT=$?
          set -e
          echo "Maestro exit code: $MAESTRO_EXIT"
          echo "Results file: $(test -f e2e/results/results.xml && echo PRESENT || echo MISSING)"
          exit $MAESTRO_EXIT
        timeout-minutes: 25
        env:
          # Give Maestro's XCUITest driver up to 5 minutes to start the
          # XCTest server on port 7001. Default (~90s) is too short on
          # freshly-booted GitHub Actions macOS runners.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
      
      - name: 📸 Upload E2E screenshots & results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            apps/mobile/e2e/results/
            ~/.maestro/tests/
          retention-days: 7
      
      - name: ✅ E2E tests passed
        run: echo "🎉 Maestro E2E tests completed!"
