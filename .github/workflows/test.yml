name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop, 'game/lebanese-poker']
  push:
    branches: [main, develop]
  # Task #23 (Tier 4): manual trigger for k6 load tests
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run k6 load tests'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  test:
    name: Lint, Type-Check, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # Expose Supabase secrets at job level so `if:` conditions on integration
    # test steps can evaluate them correctly. Step-level `env:` is only visible
    # to its own step's `if:`, causing both "skipped" warning AND integration
    # test steps to fire simultaneously (bug in run #22512987110).
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # SUPABASE_DB_PASSWORD intentionally NOT set at job level — passed only to
      # the pgTAP step below so it is not visible to unrelated steps. A gate step
      # (pgtap-gate) writes a boolean output; pgTAP reads it via steps context.

    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: 🔍 Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: 💾 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: 💾 Setup Jest transform cache
        uses: actions/cache@v4
        with:
          path: apps/mobile/.jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-jest-
      
      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🔍 Run ESLint
        run: |
          cd apps/mobile
          pnpm run lint
      
      - name: 🔧 Run TypeScript type-check
        run: |
          cd apps/mobile
          npx tsc --noEmit
      
      - name: 🗑️ Check for unused dependencies
        run: |
          cd apps/mobile
          # P8-8 FIX: Informational check for dependency drift — packages listed
          # in package.json that are never imported via static analysis.
          # The --ignores list covers build-time, type-only, config-only, and
          # React Native packages that depcheck cannot detect via static imports.
          # Non-blocking (|| true): RN/Expo projects have many runtime-loaded and
          # native packages that depcheck flags as unused; blocking CI on this
          # output produces false-positive failures. Results are visible in logs.
          pnpm dlx depcheck \
            --ignores="@types/*,ts-node,babel-jest,jest-*,metro-*,@expo/*,react-native,expo,@babel/*,eslint*,prettier*,@react-native*,@sentry/react-native" || true
      
      - name: 🧪 Run unit tests
        run: |
          cd apps/mobile
          # Run all unit tests with coverage.
          # Coverage thresholds (branches 80, functions 78, lines 78, statements 78)
          # are enforced in jest.config.js — Jest exits non-zero if coverage drops
          # below thresholds. Thresholds ratcheted +2% per sprint (Task #617, Mar 2026).
          # Previous sprint: branches 78, functions 76, lines 76, statements 76.
          # completes in ~60s on 2-vCPU CI runners (was 11+ min without isolatedModules).
          # --forceExit: forces process.exit after all tests complete if open handles
          #   remain (e.g. unclosed DB connections). It does NOT mask test failures —
          #   jest sets the exit code before the force-exit fires. Use
          #   --detectOpenHandles locally to debug any open-handle warnings.
          # --maxWorkers=2: matches CI runner's 2 vCPUs.
          NODE_OPTIONS="--max-old-space-size=3072" npx jest \
            --testPathIgnorePatterns='/integration/' \
            --forceExit --passWithNoTests \
            --maxWorkers=2 \
            --testTimeout=15000 \
            --coverage
        timeout-minutes: 15

      - name: Cold start baseline (L9)
        run: |
          # L9: Document edge function cold start baseline.
          # Supabase edge functions (Deno) show ~200-400ms cold start on first
          # invocation; warm invocations are <50ms. This step records the
          # baseline timestamp so regressions can be detected when cold starts
          # exceed 800ms (roughly 2× the upper end of the cold-start baseline).
          # See docs/COLD_START_BASELINE.md for methodology and thresholds.
          echo "Cold start baseline documented at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Baseline: 200-400ms cold / <50ms warm (Deno edge functions)"
          echo "Alert threshold: >800ms cold start (check Supabase dashboard)"

      - name: 📦 Bundle size check (Task #616)
        run: |
          cd apps/mobile
          node scripts/check-bundle-size.js

      - name: 📊 Bundle analysis report (Task #276)
        run: |
          cd apps/mobile
          node scripts/analyze-bundle.js

      - name: ⚠️ Integration tests skipped (no credentials)
        if: env.EXPO_PUBLIC_SUPABASE_ANON_KEY == '' || env.SUPABASE_SERVICE_ROLE_KEY == ''
        run: |
          echo "::warning::Integration tests cannot run because EXPO_PUBLIC_SUPABASE_ANON_KEY and/or SUPABASE_SERVICE_ROLE_KEY are not configured as GitHub secrets."
          echo "Add these secrets to the repository to enable integration tests."
          echo "Skipping integration tests — they are non-blocking until secrets are configured."

      - name: 🧪 Run integration tests
        if: env.EXPO_PUBLIC_SUPABASE_ANON_KEY != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: |
          cd apps/mobile
          NODE_OPTIONS="--max-old-space-size=3072" npx jest \
            --testPathPattern='integration/' \
            --forceExit --passWithNoTests \
            --maxWorkers=2 \
            --testTimeout=30000 \
            --no-coverage
        timeout-minutes: 5
        env:
          CI: true

      # ── Task #22 (Tier 4) — RLS pgTAP policy tests ──────────────────────────
      # Skipped when SUPABASE_DB_PASSWORD is absent (forks or unconfigured repos).
      # When present the step must pass — a pgTAP failure means RLS is broken
      # and should block the merge.
      # Tests run inside BEGIN…ROLLBACK so no data persists; seed uses per-run
      # collision guards instead of ON CONFLICT DO UPDATE to avoid touching real
      # rows or firing triggers on unexpected collisions.
      #
      # NOTE: the `secrets` context is NOT available in step-level `if:`
      # (only in step `run:` / `env:`). A gate step writes a boolean output;
      # the pgTAP step reads it via the `steps` context, which IS allowed.
      - name: 🔍 Detect pgTAP DB secret
        id: pgtap-gate
        run: echo "available=${{ secrets.SUPABASE_DB_PASSWORD != '' }}" >> $GITHUB_OUTPUT

      - name: 🔒 Run RLS policy tests (pgTAP)
        if: steps.pgtap-gate.outputs.available == 'true'
        env:
          # Scoped only to this step — not exposed to other steps in the job.
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          # Allow the Supabase project ref to be overridden via a repository
          # variable (Settings → Variables). Falls back to the default project.
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'dppybucldqufbqhwnkxu' }}
        run: |
          cd apps/mobile
          # Pin the Supabase CLI to a specific version for reproducibility.
          # Update this pin when bumping the Supabase platform version.
          npm install -g supabase@2.89.1
          supabase test db \
            --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
        timeout-minutes: 10
      # ────────────────────────────────────────────────────────────────────────

      - name: 📊 Upload test coverage
        uses: codecov/codecov-action@v6
        if: always()
        with:
          directory: ./apps/mobile/coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: ✅ All checks passed
        run: echo "🎉 All CI checks completed successfully!"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🔑 Create Firebase config for build check
        run: cp apps/mobile/google-services.json.example apps/mobile/google-services.json
      
      - name: 🏗️ Check Expo build configuration
        run: |
          cd apps/mobile
          npx expo prebuild --no-install --clean
      
      - name: ✅ Build configuration valid
        run: echo "🎉 Build configuration is valid!"

  e2e:
    name: E2E Tests (Maestro)
    runs-on: macos-latest
    needs: test
    # Only run on PRs from non-fork branches to save CI minutes (macOS
    # runners are ~10× more expensive) and because fork PRs don't have access
    # to repository secrets which the app needs to boot without crashing.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 150

    env:
      # App needs Supabase env vars to initialize without crashing.
      # Fork PRs are excluded via the `if:` condition above since they
      # cannot access these secrets.
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      # E2E test account for authenticated flow injection (optional — skipped if absent)
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
      
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: ☕ Setup Java 17 (Maestro dependency)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🎭 Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version
      
      - name: 📱 Boot iOS Simulator
        run: |
          # List available simulators and boot iPhone 16
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone 16' in d['name'] or 'iPhone 15' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          # Fallback: first available iOS device
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      print(d['udid'])
                      sys.exit(0)
          ")
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          # Wait for simulator to be ready
          xcrun simctl bootstatus "$DEVICE_ID" -b
          # Export DEVICE_ID for subsequent steps
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
      
      - name: 💾 Cache CocoaPods specs
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          # ios/Podfile doesn't exist until expo prebuild runs, so key off
          # package.json + lockfile + app.json which determine pod dependencies.
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: 💾 Cache Pods directory
        uses: actions/cache@v4
        with:
          # Cache the resolved Pods directory (spec + source) so pod install
          # only links rather than downloading on cache hits.
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-dir-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-dir-

      - name: 💾 Restore DerivedData cache (stable path, survives expo prebuild)
        uses: actions/cache/restore@v4
        with:
          # DerivedData is stored OUTSIDE ios/ so that expo prebuild --clean
          # (which wipes ios/) does not destroy the incremental build cache.
          # On cache hits xcodebuild performs an incremental compile (~2-5 min)
          # instead of a full rebuild (~15-20 min).
          path: ~/DerivedData/StephanosMobile
          # v4: force cache miss to clear stale Xcode ModuleCache (.pcm files)
          # that caused DarwinFoundation build failures when the Xcode 16.4
          # toolchain was updated (mtime changed on ptrcheck.h).
          # ModuleCache is also deleted before every build (see step below)
          # so future Xcode toolchain updates can never poison the cache again.
          key: ${{ runner.os }}-deriveddata-v4-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-v4-

      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile
      
      - name: 🔑 Create Firebase config for build
        run: cp apps/mobile/google-services.json.example apps/mobile/google-services.json

      - name: 🗑️ Clear Xcode ModuleCache (prevent mtime-poisoned cache failures)
        run: |
          # The ModuleCache contains .pcm (precompiled module) files keyed by
          # the Xcode toolchain mtime. When GitHub Actions updates Xcode between
          # cache writes and cache reads, mtime changes invalidate all modules
          # and cause cascading DarwinFoundation / _stdint errors. Deleting only
          # the ModuleCache (~seconds to regenerate) preserves the compiled
          # object files (.o) that make incremental builds fast.
          rm -rf ~/DerivedData/StephanosMobile/ModuleCache.noindex || true
          echo "ModuleCache cleared"

      - name: 🏗️ Build iOS app for Simulator
        run: |
          set -o pipefail
          cd apps/mobile
          # Prebuild WITHOUT --no-install so CocoaPods runs → generates .xcworkspace
          npx expo prebuild --clean --platform ios
          cd ios
          # Build RELEASE so JavaScript bundle is embedded in the app binary.
          # Debug builds load JS from Metro dev server which isn't available in CI,
          # causing the Expo Dev Client launcher to appear instead of the app.
          # -jobs: use all available vCPUs for parallel Clang compilation.
          # -derivedDataPath ~/DerivedData/StephanosMobile: keeps build artifacts at a
          #   stable path outside ios/ so expo prebuild --clean doesn't wipe the
          #   incremental cache on the next run (was apps/mobile/ios/build before).
          # Tee full log so we can grep Swift/Clang errors even when they scroll.
          # set +e / set -e wraps the pipeline so PIPESTATUS is captured before the
          # error-exit fires (set -e would otherwise exit immediately on a failing
          # pipeline, skipping the summary block).
          # NOTE: do NOT pipe through tail here — tail exits after N lines which causes
          # a broken pipe that sets PIPESTATUS[0]=65 and kills xcodebuild with SIGPIPE
          # even on a successful build. Tail/grep the saved log only in the summary block.
          set +e
          xcodebuild -workspace StephanosMobile.xcworkspace \
            -scheme StephanosMobile \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.DEVICE_ID }}" \
            -derivedDataPath ~/DerivedData/StephanosMobile \
            build \
            -jobs $(sysctl -n hw.ncpu) \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcodebuild.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "--- Last 150 build lines ---"
            tail -150 /tmp/xcodebuild.log
            echo "--- Swift / Clang error summary ---"
            grep -E " error: | warning: " /tmp/xcodebuild.log | head -40 || true
            exit $EXIT_CODE
          fi
        timeout-minutes: 65
        env:
          # Prevent Sentry native-symbol upload tasks from failing without SENTRY_AUTH_TOKEN.
          # Source maps / native symbols are not needed for E2E test builds.
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          # pnpm does not hoist @sentry/cli to node_modules/@sentry/cli, so the
          # first require.resolve() call in sentry-xcode-debug-files.sh exits 1
          # (with set -e active) BEFORE the SENTRY_DISABLE_AUTO_UPLOAD guard is
          # reached.  Providing any non-empty value skips that node resolution
          # entirely; the value is never invoked because SENTRY_DISABLE_AUTO_UPLOAD
          # prevents all upload code paths from executing.
          SENTRY_CLI_EXECUTABLE: 'disabled-in-ci'

      - name: 💾 Save DerivedData cache (only on success)
        # Save only on success so that failed builds do not overwrite the cache
        # with partial/corrupted DerivedData. A successful build populates the
        # cache once; subsequent runs get fast incremental builds from it.
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ~/DerivedData/StephanosMobile
          key: ${{ runner.os }}-deriveddata-v4-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
      
      - name: 📲 Install app on Simulator
        run: |
          # DerivedData is now at ~/DerivedData/StephanosMobile (stable path outside ios/)
          APP_PATH=$(find ~/DerivedData/StephanosMobile/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in derived data. Build may have failed."
            find ~/DerivedData/StephanosMobile -type d -maxdepth 4 2>/dev/null || echo "DerivedData directory doesn't exist"
            exit 1
          fi
          echo "Installing app: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: ⏳ Warm up simulator after install
        run: |
          # Give the simulator time to register the newly installed app and
          # let the XCUITest AXServer fully initialize. Without this, Maestro's
          # XCUITest driver times out connecting to port 7001 on the first run.
          # Also launch + terminate the app once so SpringBoard caches it.
          # Kill any lingering Safari/OAuth sessions from previous runs first.
          xcrun simctl terminate booted com.apple.mobilesafari || true
          xcrun simctl launch booted com.stephanos.app || true
          sleep 15
          xcrun simctl terminate booted com.stephanos.app || true
          sleep 5

      - name: 🎭 Run Maestro E2E tests (unauthenticated — ci tag)
        run: |
          cd apps/mobile
          # Create results directory (Maestro doesn't auto-create it)
          mkdir -p e2e/results
          # Phase 1: Run CI-tagged flows (unauthenticated, some include clearState: true).
          # Retry logic: iOS simulator can crash on clearState: true (flaky).
          MAX_ATTEMPTS=2
          MAESTRO_EXIT=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Maestro ci attempt $attempt/$MAX_ATTEMPTS ---"
            set +e
            maestro test --include-tags ci e2e/flows/ \
              --format junit \
              --output e2e/results/results-ci.xml
            MAESTRO_EXIT=$?
            set -e
            if [ $MAESTRO_EXIT -eq 0 ]; then
              break
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Attempt $attempt failed (exit $MAESTRO_EXIT) — re-warming simulator..."
              xcrun simctl terminate booted com.apple.mobilesafari || true
              xcrun simctl terminate booted com.stephanos.app || true
              sleep 10
              xcrun simctl launch booted com.stephanos.app || true
              sleep 15
              xcrun simctl terminate booted com.stephanos.app || true
              sleep 5
            fi
          done
          echo "Maestro ci exit code: $MAESTRO_EXIT"
          exit $MAESTRO_EXIT
        timeout-minutes: 45
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000

      - name: 🔐 Seed E2E authentication session
        id: seed_auth
        if: env.E2E_TEST_EMAIL != '' && env.E2E_TEST_PASSWORD != ''
        continue-on-error: true  # Failure handled by "Warn if auth seeding was skipped" step below
        run: |
          cd apps/mobile
          # Terminate any running app instance first
          xcrun simctl terminate booted com.stephanos.app || true
          sleep 2
          # Launch app once to initialise storage, then terminate.
          # Use 25s (was 15s, 8s) — cold CI simulators need more time for
          # AsyncStorage / RCTAsyncLocalStorage_V1 directory init.
          # NOTE: injection happens AFTER this terminate, so this launch cannot
          # consume the injected session (no migration to simctl Keychain occurs).
          xcrun simctl launch booted com.stephanos.app || true
          sleep 25
          xcrun simctl terminate booted com.stephanos.app || true
          sleep 3
          # Inject Supabase session + consent bypass into AsyncStorage
          node scripts/ci-seed-e2e-auth.mjs
        env:
          CI_PLATFORM: ios

      - name: ⚠️ Warn if auth seeding was skipped
        if: env.E2E_TEST_EMAIL != '' && env.E2E_TEST_PASSWORD != '' && steps.seed_auth.outcome != 'success'
        run: |
          echo "::warning::Auth seeding skipped or failed (outcome=${{ steps.seed_auth.outcome }}). Authenticated E2E flows (ci-authenticated) will not run. CI coverage is reduced."

      - name: 🎭 Run Maestro E2E tests (authenticated — ci-authenticated tag)
        if: steps.seed_auth.outcome == 'success'
        run: |
          cd apps/mobile
          mkdir -p e2e/results
          # Phase 2: Run authenticated flows now that session is injected.
          # IMPORTANT: Do NOT launch the app between seed injection and this step.
          # Launching the app in simctl context before Maestro/XCUITest runs
          # triggers the AsyncStorage→SecureStore migration, which removes the
          # injected session from AsyncStorage. When Maestro then launches the
          # app via XCUITest (different Keychain namespace), SecureStore is empty
          # and AsyncStorage was already cleared — session is lost.
          # By skipping the pre-warm, Maestro's launchApp (XCUITest context) reads
          # the session directly from AsyncStorage on every flow's first launch.
          # MAX_ATTEMPTS=1 (single attempt) so that the worst-case time is
          # 52 flows × 35s timeout = ~30 min, well within the 45-min step limit.
          MAX_ATTEMPTS=1
          MAESTRO_EXIT=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Maestro ci-authenticated attempt $attempt/$MAX_ATTEMPTS ---"
            set +e
            maestro test --include-tags ci-authenticated e2e/flows/ \
              --format junit \
              --output e2e/results/results-ci-authenticated.xml
            MAESTRO_EXIT=$?
            set -e
            if [ $MAESTRO_EXIT -eq 0 ]; then
              break
            fi
          done
          echo "Maestro ci-authenticated exit code: $MAESTRO_EXIT"
          # Authenticated tests are non-blocking during stabilisation unless
          # E2E_AUTH_NON_BLOCKING is explicitly set to 'false'.
          if [ "${E2E_AUTH_NON_BLOCKING:-true}" = "false" ]; then
            exit $MAESTRO_EXIT
          elif [ $MAESTRO_EXIT -ne 0 ]; then
            echo "::warning::Authenticated E2E tests failed (exit $MAESTRO_EXIT) — non-blocking (set E2E_AUTH_NON_BLOCKING=false to enforce)"
          fi
        timeout-minutes: 45
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
          CI_PLATFORM: ios
      
      - name: 📸 Upload E2E screenshots & results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-results
          path: |
            apps/mobile/e2e/results/
            ~/.maestro/tests/
          retention-days: 7
      
      - name: 📊 E2E test summary
        if: always()
        run: |
          echo "🎉 Maestro E2E tests completed!"
          CI_COUNT=$(grep -c "<testcase" apps/mobile/e2e/results/results-ci.xml 2>/dev/null || true)
          CI_COUNT=${CI_COUNT:-0}

          AUTH_RESULTS_FILE="apps/mobile/e2e/results/results-ci-authenticated.xml"
          AUTH_COUNT="n/a"
          AUTH_STATUS="not configured"

          if [ -n "$E2E_TEST_EMAIL" ] && [ -n "$E2E_TEST_PASSWORD" ]; then
            SEED_AUTH_OUTCOME="${{ steps.seed_auth.outcome }}"

            if [ "$SEED_AUTH_OUTCOME" = "success" ]; then
              if [ -f "$AUTH_RESULTS_FILE" ]; then
                AUTH_COUNT=$(grep -c "<testcase" "$AUTH_RESULTS_FILE" 2>/dev/null || true)
                AUTH_COUNT=${AUTH_COUNT:-0}
                AUTH_STATUS="completed"
              else
                AUTH_STATUS="results missing"
              fi
            else
              AUTH_STATUS="seed phase ${SEED_AUTH_OUTCOME:-unknown}"
            fi
          fi

          echo "📊 CI flows: $CI_COUNT | Authenticated flows: $AUTH_COUNT ($AUTH_STATUS)"

  android-e2e:
    name: E2E Tests (Android / Maestro)
    runs-on: ubuntu-latest
    needs: test
    # Only run on non-fork PRs — fork PRs can't access secrets
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 120

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      # E2E test account for authenticated flow injection (optional — skipped if absent)
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: 🗑️ Free disk space before Android build
        run: |
          # Remove large pre-installed tools not needed for Android builds.
          # Keep the Android NDK installed: some RN modules require it for native/CMake builds.
          # Java setup (setup-java) runs after this step so JAVA_HOME is always fresh.
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm/temurin-8-jdk-amd64 /usr/lib/jvm/temurin-11-jdk-amd64 \
            /usr/lib/jvm/temurin-21-jdk-amd64 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          df -h

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🔍 Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 💾 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: |
          cd apps/mobile
          pnpm install --frozen-lockfile

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/package.json', 'apps/mobile/pnpm-lock.yaml', 'apps/mobile/app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🎭 Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          maestro --version

      - name: 🤖 Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Firebase config for build
        run: cp apps/mobile/google-services.json.example apps/mobile/google-services.json

      - name: 🏗️ Build Android release APK
        run: |
          set -euo pipefail
          cd apps/mobile
          npx expo prebuild --clean --platform android
          # expo prebuild generates org.gradle.jvmargs=-Xmx2048m which overrides
          # the GRADLE_OPTS env var, causing D8 dex merger to OOM on CI runners.
          # Patch it to 4096m before running Gradle.
          sed -i "s/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m/" android/gradle.properties
          echo "Gradle JVM args after patch:"; grep jvmargs android/gradle.properties
          cd android
          chmod +x gradlew
          # Pre-generate RN codegen artifacts (creates Sentry and other modules' JNI
          # directories) before assembleRelease triggers CMake configure. Without this
          # the configureCMake* task fails on cold cache because those directories do
          # not exist in the published npm packages — they are generated by Gradle's
          # code-generation step. On a warm Gradle build cache the restored task
          # outputs normally satisfy CMake, but a cold-cache run has no such fallback.
          ./gradlew generateCodegenArtifactsFromSchema \
            -x lint \
            --no-daemon
          ./gradlew assembleRelease \
            -x lint \
            --no-daemon \
            --parallel
        timeout-minutes: 45
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dorg.gradle.daemon=false -Dorg.gradle.configureondemand=true"
          # Prevent Sentry native-symbol upload tasks from failing without SENTRY_AUTH_TOKEN.
          # Source maps / native symbols are not needed for E2E test builds.
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'

      - name: 📱 Boot Android Emulator and run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash apps/mobile/scripts/android-e2e.sh
        timeout-minutes: 55

      - name: 📸 Upload Android E2E results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-e2e-results
          path: apps/mobile/e2e/results-android/
          retention-days: 7

      - name: 📦 Upload Android APK artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-test-apk
          path: apps/mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: ✅ Android E2E tests passed
        run: echo "🎉 Android Maestro E2E tests completed!"

  # ── Task #23 (Tier 4) — k6 Load Tests ────────────────────────────────────
  # Runs on every PR/push in smoke mode (K6_SMOKE_MODE=true) to verify the
  # k6 script executes correctly. Full load (20/10/15 VUs, ~2 min) only runs
  # via workflow_dispatch. continue-on-error so a regression never blocks a
  # release. Check k6 output / thresholds in the job logs.
  load_test:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && github.event.repository.fork == false) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_load_tests == 'true')
    continue-on-error: true
    timeout-minutes: 15

    env:
      # Public project URL — not a secret; falls back to the project URL when
      # the secret is absent (e.g. on forks or in repos without secrets configured).
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://dppybucldqufbqhwnkxu.supabase.co' }}
      # Anon key — constrained to read-only RLS access; the same key is shipped
      # in the mobile app bundle and is therefore not a sensitive credential.
      # Source from repo variable or secret (set EXPO_PUBLIC_SUPABASE_ANON_KEY in
      # Settings → Actions → Variables or Secrets to ensure k6 tests always run).
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      # Service role key stays secret-only; load scenarios that need it are gated.
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # PR/push runs use smoke mode (3 scenarios, ~30s total) to verify the
      # script executes without errors. Full load is triggered via workflow_dispatch.
      K6_SMOKE_MODE: ${{ github.event_name != 'workflow_dispatch' && 'true' || 'false' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6
          k6 version

      - name: 🚀 Run k6 load tests
        run: |
          k6 run \
            --env SUPABASE_URL="${EXPO_PUBLIC_SUPABASE_URL}" \
            --env ANON_KEY="${EXPO_PUBLIC_SUPABASE_ANON_KEY}" \
            --env SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
            --env K6_SMOKE_MODE="${K6_SMOKE_MODE}" \
            apps/mobile/e2e/load/k6-load-test.js
        timeout-minutes: 10
  # ─────────────────────────────────────────────────────────────────────────
